  # NOWY PRZYCISK: Ręczna naprawa ustawień baterii (gdyby automat zawiódł)
  - platform: template
    name: "SYSTEM: Napraw Baterię RTC (Rejestry)"
    on_press:
      - lambda: |-
          id(ds_time).write_byte(0x0E, 0x00); // Enable Oscillator
          id(ds_time).write_byte(0x0F, 0x00); // Clear OSF flag
