interval:
  - interval: 1s
    then:
      - lambda: |-
          // --- SEKCJA A: MENU TIMEOUT (Musi być na górze!) ---
          if (id(menu_active)) {
            // POPRAWKA: Jeśli trwa dozowanie ręczne (trzymamy przycisk), resetujemy licznik czasu, aby nie wyjść z menu
            if (id(manual_continuous_active)) {
              id(menu_last_activity) = millis();
            }

            uint32_t diff = millis() - id(menu_last_activity);
            if (diff > 10000) { // 10 sekund
              id(menu_active) = false;
              id(manual_continuous_active) = false;
              // ZABEZPIECZENIE: Wymuszone zatrzymanie wszystkich pomp przy wyjściu z menu
              id(p1).turn_off().perform();
              id(p2).turn_off().perform();
              id(p3).turn_off().perform();
              id(p4).turn_off().perform();
              id(p5).turn_off().perform();
              id(p6).turn_off().perform();
              
              id(menu_selection) = 1;
              id(my_display).update();
              ESP_LOGI("MENU", "Timeout - powrót do ekranu głównego");
            }
          }

  # --- WIZUALIZACJA LED I LOGIKA PH ---
  - interval: 2s # Częstotliwość odświeżania wizualizacji i logiki pH
    then:
      - lambda: |-
          // Funkcja pomocnicza do mapowania wartości
          auto map_value = [](float x, float in_min, float in_max, float out_min, float out_max) -> float {
            return (x - in_min) * (out_max - out_min) / (in_max - in_min) + out_min;
          };

          // Pobieramy wskaźnik do sterowania poszczególnymi diodami
          esphome::light::AddressableLight *leds = (esphome::light::AddressableLight *) id(led_strip_physical).get_output();

          // --- WIZUALIZACJA TEMPERATURY (Linia 1, LEDy 0-7) ---
          float temp = id(temp_akwarium).state;
          if (!isnan(temp)) {
            int leds_on = map_value(temp, 20.0, 28.0, 1, 8);
            leds_on = clamp(leds_on, 0, 8);
            Color color;
            if (temp <= 24.0) {
              // Gradient od Niebieskiego (przy 20°C) do Zielonego (przy 24°C)
              uint8_t green = clamp((int)map_value(temp, 20.0, 24.0, 0, 255), 0, 255);
              uint8_t blue = clamp((int)map_value(temp, 20.0, 24.0, 255, 0), 0, 255);
              color = Color(0, green, blue);
            } else {
              // Gradient od Zielonego (przy 24°C) do Czerwonego (przy 28°C)
              uint8_t red = clamp((int)map_value(temp, 24.0, 28.0, 0, 255), 0, 255);
              uint8_t green = clamp((int)map_value(temp, 24.0, 28.0, 255, 0), 0, 255);
              color = Color(red, green, 0);
            }
            for (int i = 0; i < 8; i++) {
              if (i < leds_on) (*leds)[i] = color;
              else (*leds)[i] = Color::BLACK;
            }
          } else {
            for (int i = 0; i < 8; i++) { (*leds)[i] = Color(50,0,0); }
          }

          // --- WIZUALIZACJA TDS (Linia 2, LEDy 8-10) ---
          float tds = id(tds_real).state;
          if (!isnan(tds)) {
            // 3 diody dla TDS (8, 9, 10)
            // NOWE PROGI DLA MAĆKA:
            // < 150 (niebieski - woda RO/jałowa)
            // 150 - 350 (zielony - OPTIMUM dla Twoich soli)
            // > 350 (czerwony - wysoka mineralizacja/czas na podmianę)
            int tds_level = 0;

            Color tds_color = Color::BLACK;
            
            if (tds > 10) { 
              tds_level = 1; tds_color = Color(0, 0, 255); // Niebieski (RO+)
            } 
            if (tds > 150) { 
              tds_level = 2; tds_color = Color(0, 255, 0); // Zielony (Nawozy OK)
            } 
            if (tds > 350) { 
              tds_level = 3; tds_color = Color(255, 0, 0); // Czerwony (Wysoki TDS)
            }

            for (int i = 0; i < 3; i++) {
              if (i < tds_level) (*leds)[8 + i] = tds_color;
              else (*leds)[8 + i] = Color::BLACK;
            }
          } else {
            for (int i = 8; i <= 10; i++) { (*leds)[i] = Color(20, 0, 0); } // Błąd TDS
          }

          // --- WIZUALIZACJA pH (Linia 2, LEDy 11-13) ---
          float ph = id(ph_akwarium).state;
          if (!isnan(ph)) {
            // Mapujemy pH 6.0-7.6 na 3 diody (11, 12, 13)
            int led_index = map_value(ph, 6.0, 7.6, 11, 13);
            led_index = clamp(led_index, 11, 13);
            
            for (int i = 11; i <= 13; i++) { (*leds)[i] = Color::BLACK; }
            
            Color ph_color;
            if (ph < 6.2) ph_color = Color(255, 255, 0);      // Żółty (Zakwaszone - CO2 dużo)
            else if (ph > 6.8) ph_color = Color(0, 0, 255);   // Niebieski (Zasadowe - CO2 mało)
            else ph_color = Color(0, 255, 0);                 // Zielony (Strefa celowa 6.2 - 6.8)
            (*leds)[led_index] = ph_color;
          } else {
            for (int i = 11; i <= 13; i++) { (*leds)[i] = Color(20, 0, 0); } // Błąd pH
          }


          // --- STATUS WIFI (Dioda 7 w linii 2 -> LED 14) ---
          if (wifi::global_wifi_component->is_connected()) {
             long rssi = wifi::global_wifi_component->wifi_rssi();
             // Skala sygnału: >-60 (Mocny), >-80 (Średni), <-80 (Słaby)
             if (rssi >= -60) (*leds)[14] = Color(0, 255, 0); // Zielony
             else if (rssi >= -80) (*leds)[14] = Color(255, 255, 0); // Żółty
             else (*leds)[14] = Color(255, 0, 0); // Czerwony
          } else {
             // Brak WiFi - mruganie na czerwono
             if ((millis() / 500) % 2 == 0) (*leds)[14] = Color(255, 0, 0);
             else (*leds)[14] = Color::BLACK;
          }

          // --- STATUS CO2 (Dioda 8 w linii 2 -> LED 15) ---
          if (id(co2_solenoid_valve).state) {
            (*leds)[15] = Color(0, 100, 0); // Zielony
          } else {
            (*leds)[15] = Color(30, 30, 30); // Szary/Biały
          }

          leds->schedule_show();



  # --- DIAGNOSTYKA RTC (Co 10s) ---
  - interval: 10s
    then:
      - lambda: |-
          uint8_t status = 0;
          id(ds_time).read_byte(0x0F, &status);
          // Jeśli bit 7 (0x80) jest ustawiony, oznacza to, że oscylator stanął (brak baterii)
          id(rtc_battery_status).publish_state(status & 0x80);

time:
  - platform: ds1307
    id: ds_time
    address: 0x68
    timezone: "Europe/Warsaw"
    update_interval: 15s # Bardzo częsta aktualizacja, aby szybko łapać czas po starcie
    on_time:
      - seconds: 0
        then:
          # --- POMPA 1 ---
          - if:
              condition:
                lambda: |-
                  auto now = id(ds_time).now();
                  int h = (int)id(h_p1).state;
                  int m = (int)id(m_p1).state;
                  if (!((now.hour == h && now.minute == m) && (h != 0 || m != 0))) return false;
                  
                  int dow = now.day_of_week; 
                  if (dow == 2) return id(p1_mon).state;
                  if (dow == 3) return id(p1_tue).state;
                  if (dow == 4) return id(p1_wed).state;
                  if (dow == 5) return id(p1_thu).state;
                  if (dow == 6) return id(p1_fri).state;
                  if (dow == 7) return id(p1_sat).state;
                  if (dow == 1) return id(p1_sun).state;
                  return false;
              then:
                - script.execute: script_p1

          # --- POMPA 2 ---
          - if:
              condition:
                lambda: |-
                  auto now = id(ds_time).now();
                  int h = (int)id(h_p2).state;
