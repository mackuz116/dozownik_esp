  # --- PASEK LED WS2812b (Pixel) na PIN 18 ---
  # 1. Fizyczna konfiguracja całego łańcucha (16 diod razem)
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: 18
    num_leds: 16
    name: "LED Fizyczny"
    id: led_strip_physical
    internal: true # Ukrywamy ten byt, sterujemy logicznymi liniami poniżej

  # 2. Logiczna Linia 1 (Diody 1-8)
  - platform: partition
    name: "LED Linia 1"
    id: led_line_1
    segments:
      - id: led_strip_physical
        from: 0
        to: 7
    effects: &led_effects
      - addressable_rainbow:
          name: Rainbow
      - pulse:
      - strobe:

  # 3. Logiczna Linia 2 (Diody 9-16)
  - platform: partition
    name: "LED Linia 2"
    id: led_line_2
    segments:
      - id: led_strip_physical
        from: 8
        to: 15
    effects: *led_effects

binary_sensor:
  - platform: gpio
    pin:
      number: 23
      mode: INPUT_PULLUP
      inverted: true
    name: "Przycisk Menu"
    id: menu_button
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - if:
            condition:
              lambda: "return id(menu_active);"
            then:
              - lambda: |-
                  id(manual_continuous_active) = true;
                  id(manual_dose_start_time) = millis();
              # WYWOŁUJEMY SPRAWDZONE SKRYPTY YAML DLA STARTU
              - if:
                  condition: { lambda: "return id(menu_selection) == 1;" }
                  then: [light.turn_on: { id: p1, brightness: !lambda "return id(p1_speed).state / 100.0;", transition_length: 500ms }]
              - if:
                  condition: { lambda: "return id(menu_selection) == 2;" }
                  then: [light.turn_on: { id: p2, brightness: !lambda "return id(p2_speed).state / 100.0;", transition_length: 500ms }]
              - if:
                  condition: { lambda: "return id(menu_selection) == 3;" }
                  then: [light.turn_on: { id: p3, brightness: !lambda "return id(p3_speed).state / 100.0;", transition_length: 500ms }]
              - if:
                  condition: { lambda: "return id(menu_selection) == 4;" }
                  then: [light.turn_on: { id: p4, brightness: !lambda "return id(p4_speed).state / 100.0;", transition_length: 500ms }]
              - if:
                  condition: { lambda: "return id(menu_selection) == 5;" }
                  then: [light.turn_on: { id: p5, brightness: !lambda "return id(p5_speed).state / 100.0;", transition_length: 500ms }]
              - if:
                  condition: { lambda: "return id(menu_selection) == 6;" }
                  then: [light.turn_on: { id: p6, brightness: !lambda "return id(p6_speed).state / 100.0;", transition_length: 500ms }]
            else:
              - lambda: |-
                  id(menu_active) = true;
                  id(menu_last_activity) = millis();
                  id(ignore_next_click) = true;
                  id(my_display).update();

    on_release:
      then:
        - if:
            condition:
              lambda: "return id(ignore_next_click);"
            then:
              - lambda: "id(ignore_next_click) = false;"
            else:
              - if:
                  condition:
                    lambda: "return id(menu_active);"
                  then:
                    - if:
                        condition:
                          lambda: "return id(manual_continuous_active);"
                        then:
                          # ZATRZYMANIE TEŻ PRZEZ YAML
                          - light.turn_off: p1
                          - light.turn_off: p2
                          - light.turn_off: p3
                          - light.turn_off: p4
                          - light.turn_off: p5
                          - light.turn_off: p6
                          - lambda: |-
                              int pump = id(menu_selection);
                              long duration = millis() - id(manual_dose_start_time);
                              float calib = 1.0f;
                              if (pump == 1) calib = id(c1).state;
                              else if (pump == 2) calib = id(c2).state;
                              else if (pump == 3) calib = id(c3).state;
                              else if (pump == 4) calib = id(c4).state;
                              else if (pump == 5) calib = id(c5).state;
                              else if (pump == 6) calib = id(c6).state;
                              
                              if (calib < 0.1f) calib = 1.0f;
                              float ml = (duration / 1000.0f) / calib;
                              
                              if (pump == 1) id(p1_level).publish_state(max(0.0f, id(p1_level).state - ml));
                              else if (pump == 2) id(p2_level).publish_state(max(0.0f, id(p2_level).state - ml));
                              else if (pump == 3) id(p3_level).publish_state(max(0.0f, id(p3_level).state - ml));
                              else if (pump == 4) id(p4_level).publish_state(max(0.0f, id(p4_level).state - ml));
                              else if (pump == 5) id(p5_level).publish_state(max(0.0f, id(p5_level).state - ml));
                              else if (pump == 6) id(p6_level).publish_state(max(0.0f, id(p6_level).state - ml));
                              
                              global_preferences->sync();
                              id(manual_continuous_active) = false;
                              id(menu_last_activity) = millis();
                              id(my_display).update();
                        else:
                          - script.execute: script_manual_run

  - platform: template
    name: "SYSTEM: Status Baterii RTC"
    id: rtc_battery_status
    device_class: problem