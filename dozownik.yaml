# 2. Główny sensor pH - SKALIBROWANY PO EKRANOWANIU
  - platform: template
    name: "pH Akwarium"
    id: ph_akwarium
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    update_interval: 5s
    lambda: return id(ph_raw_v).state; 
    filters:
      - calibrate_linear:
          # 1. Punkt: Słoik 6.86 (napięcie które miałeś wcześniej) -> Realne pH
          - 4.210 -> 6.86
          # 2. Punkt: Słoik 4.01 (napięcie z logów przed chwilą) -> Realne pH
          - 4.455 -> 4.01
          # 3. Punkt: Akwarium (Twoje stabilne napięcie w uziemionej wodzie) -> Obliczone pH
          # Skoro w akwarium masz 5.25V, a w słoiku 6.86 miałeś 4.21V, 
          # to przy uziemieniu Twój "punkt zero" przesunął się o ok. 1V.
          - 5.270 -> 6.75  # To jest wyliczone pH na podstawie Twojego miernika (5.77 + korekta błędu)
      - sliding_window_moving_average:
          window_size: 20
          send_every: 1

    on_value:
      then:
      - lambda: |-
            // 1. Obliczamy trend (Szybkość zmiany)
            id(ph_slope_manual) = (x - id(ph_last_value)) * 12.0f;
            
            // 2. Logika czasu i trendu
            auto now = id(ds_time).now();
            int now_min = now.hour * 60 + now.minute;
            int start_min = (int)id(co2_start_h).state * 60 + (int)id(co2_start_m).state;
            int stop_min = (int)id(co2_stop_h).state * 60 + (int)id(co2_stop_m).state;
            
            // Sprawdzamy czy mieścimy się w godzinach (używane tylko w trybie Ręcznym)
            bool in_time = (start_min < stop_min) ? (now_min >= start_min && now_min < stop_min) : (now_min >= start_min || now_min < stop_min);

            bool should_be_on = false;
            bool safety_trip = (id(ph_slope_manual) < -0.15f);

            // --- KLUCZOWA ZMIANA DLA AUTOMATYKI ---
            // Jeśli AUTO (state == true) -> pozwalamy na działanie ZAWSZE (true)
            // Jeśli MANUAL (state == false) -> pozwalamy tylko w godzinach (in_time)
            bool logic_allowed = id(co2_auto_mode).state ? true : in_time;

            if (x > 5.0 && logic_allowed && !safety_trip) {
              if (id(co2_auto_mode).state) {
                // TRYB AUTOMATYCZNY: Pilnuje pH całą dobę z histerezą
                if (x > (id(ph_setpoint).state + id(ph_hysteresis).state)) {
                  should_be_on = true;
                } else if (x < (id(ph_setpoint).state - id(ph_hysteresis).state)) {
                  should_be_on = false;
                } else {
                  // Podtrzymanie obecnego stanu wewnątrz widełek histerezy
                  should_be_on = id(co2_solenoid_valve).state;
                }
              } else {
                // TRYB RĘCZNY: Działa tylko w godzinach in_time
                should_be_on = true; 
              }
            } else if (safety_trip) {
              ESP_LOGE("safety", "ALARM: pH spada zbyt szybko! Odcinam CO2.");
              should_be_on = false;
            }

            // 3. Fizyczna ochrona przekaźnika (min. 10s zwłoki)
            static uint32_t last_switch = 0;
            if (should_be_on != id(co2_solenoid_valve).state) {
              if (millis() - last_switch > 10000) {
                if (should_be_on) id(co2_solenoid_valve).turn_on();
                else id(co2_solenoid_valve).turn_off();
                last_switch = millis();
              }
            }
            id(ph_last_value) = x;


  - platform: template
    name: "Szybkosc Zmiany pH"
    unit_of_measurement: "pH/min"
    accuracy_decimals: 3
    lambda: return id(ph_slope_manual);
    update_interval: 5s


  - platform: template
    name: "P1: Poziom (ml)"
    id: p1_level_ml
    unit_of_measurement: "ml"
    accuracy_decimals: 0
    state_class: "measurement"
    icon: "mdi:water-percent"
    lambda: |-
      // Zabezpieczenie: jeśli wartość jest mniejsza lub równa 0 przy starcie, 
      // nie wysyłaj jej do HA, dopóki system nie odczyta poprawnej liczby.
      if (id(p1_level).state <= 0) return {};
