display:
  - platform: lcd_pcf8574
    dimensions: 20x4
    address: 0x27
    id: my_display
    update_interval: 1s
    lambda: |-
      if (id(menu_active)) {
        if (id(manual_continuous_active)) {
           it.print(0, 0, "!!! DOZOWANIE !!!");
           it.printf(0, 1, "Pompa P%d", id(menu_selection));
           
           long duration = millis() - id(manual_dose_start_time);
           float calib = 1.0;
           int pump = id(menu_selection);
           if (pump == 1) calib = id(c1).state;
           else if (pump == 2) calib = id(c2).state;
           else if (pump == 3) calib = id(c3).state;
           else if (pump == 4) calib = id(c4).state;
           else if (pump == 5) calib = id(c5).state;
           else if (pump == 6) calib = id(c6).state;
           
           if (calib < 0.1) calib = 1.0;
           float ml = (duration / 1000.0) / calib;
           
           it.printf(0, 2, "Ilosc: %.1f ml", ml);
           it.print(0, 3, "Pusc aby zatrzymac");
           return;
        }

        it.print(0, 0, "TRYB RECZNY (MANUAL)");
        int sel = id(menu_selection);
        it.printf(0, 1, "Wybor: POMPA P%d", sel);
        
        if (sel == 1) it.print(0, 2, "Mikro");
        else if (sel == 2) it.print(0, 2, "KNO3 (Azot)");
        else if (sel == 3) it.print(0, 2, "K2SO4 (Potas)");
        else if (sel == 4) it.print(0, 2, "Carbo");
        else if (sel == 5) it.print(0, 2, "MgSO4 (Magnez)");
        else if (sel == 6) it.print(0, 2, "Makro");
        
        it.print(0, 3, "Kliknij aby dozowac");
        return;
      }

      // Linia 1: Data i Godzina (20 znaków)
      auto rtc_time = id(ds_time).now();
      auto net_time = id(sntp_time).now();

      if (rtc_time.year >= 2020) {
         it.strftime(0, 0, "%d.%m.%Y  %H:%M:%S", rtc_time);
      } else if (net_time.is_valid() && net_time.year >= 2020) {
         it.strftime(0, 0, "%d.%m.%Y *%H:%M:%S", net_time); // * oznacza czas z WiFi (awaria RTC)
      } else if (millis() < 10000) {
         it.print(0, 0, "Inicjalizacja RTC..."); // Przez pierwsze 10s nie strasz błędem
      } else {
         it.print(0, 0, "BLAD BATERII RTC!   ");
      }
      
      // Linia 2: Rotacja butelek (z funkcją MX dla 100%)
      int cycle = (millis() / 5000) % 3; // Zmiana co 5 sekund
      
      if (cycle == 0) {
        // Pompy 1, 2, 3
        float p1 = id(p1_level).state / 10.0;
        float p2 = id(p2_level).state / 10.0;
        float p3 = id(p3_level).state / 10.0;
        
        it.printf(0, 1, "P1:%s%% P2:%s%% P3:%s%%", 
          (p1 >= 100.0 ? "MX" : str_sprintf("%2.0f", p1).c_str()),
          (p2 >= 100.0 ? "MX" : str_sprintf("%2.0f", p2).c_str()),
          (p3 >= 100.0 ? "MX" : str_sprintf("%2.0f", p3).c_str()));
      } else if (cycle == 1){
        // Pompy 4, 5, 6
        float p4 = id(p4_level).state / 10.0;
        float p5 = id(p5_level).state / 10.0;
        float p6 = id(p6_level).state / 10.0;
        
        it.printf(0, 1, "P4:%s%% P5:%s%% P6:%s%%", 
          (p4 >= 100.0 ? "MX" : str_sprintf("%2.0f", p4).c_str()),
          (p5 >= 100.0 ? "MX" : str_sprintf("%2.0f", p5).c_str()),
          (p6 >= 100.0 ? "MX" : str_sprintf("%2.0f", p6).c_str()));
      } else {
        // Etap 3: TREND PH (Wyraźny podgląd)
        it.printf(0, 1, "TREND pH: %+6.3f/min ", id(ph_slope_manual));
      }
      
      // Linia 3: PH i Temperatura (rozdzielone, z dużą ilością miejsca)
      it.printf(0, 2, "PH:%4.2f  Temp:%4.1fC", 
        id(ph_akwarium).state, id(temp_akwarium).state);
      
      
      // Linia 4: TDS i status CO2 (Tryb Auto vs Ręczny)
      //if (id(co2_auto_mode).state) {
        // Jeśli automat jest włączony, pokazuje ON/OFF wg komputera
        //it.printf(0, 3, "TDS:%3.0f CO2:%s (A)", 
        //  id(tds_real).state,
        //  id(co2_solenoid_valve).state ? "ON " : "OFF");
      //} else {
        // Jeśli automat jest wyłączony, alarmuje napisem "MANUAL" lub "RECZ"
        //it.printf(0, 3, "TDS:%3.0f CO2:%s (M)", 
          //id(tds_real).state,
          //id(co2_solenoid_valve).state ? "ON " : "OFF");
      //}
      
      
      // Linia 4: TDS i status CO2 LUB status dozowania
      if (id(p1).remote_values.is_on())      { it.print(0, 3, ">>> POMPA 1: ON <<<"); }
      else if (id(p2).remote_values.is_on()) { it.print(0, 3, ">>> POMPA 2: ON <<<"); }
      else if (id(p3).remote_values.is_on()) { it.print(0, 3, ">>> POMPA 3: ON <<<"); }
      else if (id(p4).remote_values.is_on()) { it.print(0, 3, ">>> POMPA 4: ON <<<"); }
      else if (id(p5).remote_values.is_on()) { it.print(0, 3, ">>> POMPA 5: ON <<<"); }
      else if (id(p6).remote_values.is_on()) { it.print(0, 3, ">>> POMPA 6: ON <<<"); }
      else {
        // Standardowy widok, gdy żadna pompa nie pracuje
        if (id(co2_auto_mode).state) {
          it.printf(0, 3, "TDS:%3.0f CO2:%s (A)", 
            id(tds_real).state,
            id(co2_solenoid_valve).state ? "ON " : "OFF");
        } else {
          it.printf(0, 3, "TDS:%3.0f CO2:%s (M)", 
            id(tds_real).state,
            id(co2_solenoid_valve).state ? "ON " : "OFF");
        }
      }






      
      //it.printf(0, 3, "TDS:%3.0f ppm", id(tds_real).state);

      //it.printf(0, 3, "TDS:%3.0f CO2:%s", 
      //  id(tds_real).state,
      //  id(co2_solenoid_valve).state ? "ON " : "OFF");

      // it.printf(14, 3, "%c%c%c%c%c%c", 
      //   id(p1).remote_values.is_on() ? '1' : '.',
