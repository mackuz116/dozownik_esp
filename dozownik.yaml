    mode: queued
    then:
      - logger.log: "INFO: Start bezpiecznych dawek po podmianie..."
      
      - if:
          condition: { lambda: "return id(d1_sub).state > 0;" }
          then:
            - light.turn_on: { id: p1, brightness: !lambda "return id(p1_speed).state / 100.0f;", transition_length: 500ms }
            - delay: !lambda "return (id(d1_sub).state * id(c1).state * 1000.0f);"
