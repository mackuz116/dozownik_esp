esphome:
  name: dozownik-nawozow
  friendly_name: "Dozownik V3.1 - WROOM"

  # FIX DLA DS3231: Wymuszenie pracy na baterii
  on_boot:
    priority: -100 # POPRAWKA: Uruchom PO inicjalizacji I2C (wcześniej było za wcześnie)
    then:
      # KROK 3: Bezpieczeństwo - zawsze wyłącz CO2 przy starcie systemu
      - switch.turn_off: co2_solenoid_valve
      - logger.log: "WATCHDOG: System wystartował, CO2 wymuszone na OFF"
      ##
      - delay: 1s # Daj chwilę na ustabilizowanie napięć
      - lambda: |-
          // Diagnostyka przed naprawą
          uint8_t status = 0;
          id(ds_time).read_byte(0x0F, &status);
          if (status >> 7) { ESP_LOGE("RTC_DIAG", "Wykryto zanik zasilania RTC! (OSF Flag set). Status: 0x%02X", status); }
          else { ESP_LOGI("RTC_DIAG", "RTC trzyma zasilanie poprawnie. Status: 0x%02X", status); }

          // Rejestr 0x0E w DS3231 steruje zasilaniem. Wpisanie 0x00 włącza oscylator na baterii (EOSC=0).
          // Rejestr 0x0F (Status) - zerujemy flagę OSF (Oscillator Stop Flag)
          id(ds_time).write_byte(0x0E, 0x00);
          id(ds_time).write_byte(0x0F, 0x00);
          ESP_LOGI("DS3231_FIX", "Wymuszono włączenie podtrzymania bateryjnego (Reg 0x0E=0, 0x0F=0)");
          
          // WYMUSZENIE ODCZYTU CZASU: Po naprawie rejestrów, każemy ESP od razu pobrać godzinę
          id(ds_time).update();

esp32:
  board: esp32dev
  framework:
    type: arduino



# 1. Włączamy obsługę zapytań HTTP
http_request:
  useragent: esphome/device
  timeout: 15s
  verify_ssl: false  # To uciszy błąd kompilatora

preferences:
  flash_write_interval: 1min  # Wyłączamy auto-zapis (używamy Twojego sync)

globals:
  - id: menu_active
    type: bool
    initial_value: 'false'
  - id: menu_selection
    type: int
    initial_value: '1'
  - id: menu_last_activity
    type: int
    initial_value: '0'
  - id: manual_continuous_active
    type: bool
    initial_value: 'false'
  - id: manual_dose_start_time
    type: int
    initial_value: '0'
  - id: ignore_next_click
    type: bool
    initial_value: 'false'
  # Nowe zmienne do Safety Feature (pH)
  - id: ph_last_value
    type: float
    initial_value: '6.5'
  - id: ph_slope_manual
    type: float
    initial_value: '0.0'


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  reboot_timeout: 15min # Jeśli nie ma WiFi przez 15 min -> restart

web_server:
  port: 80
  version: 2

api:
  encryption:
    key: !secret api_encryption_key
  password: !secret ota_password
  reboot_timeout: 15min # Jeśli HA nie odpowiada przez 15 min -> restart

ota:
  - platform: esphome


i2c:
  sda: 21
  scl: 22
  scan: true
  frequency: 50kHz # Zmniejszamy prędkość dla stabilności RTC
  timeout: 100ms # Kluczowe: nie czekaj w nieskończoność na odpowiedź ADS1115


