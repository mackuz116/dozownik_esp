  - id: script_manual_hold_start
    then:
      - logger.log: "Manual hold triggered"
  
    # --- 2. URUCHOMIENIE DAWKI Z MENU ---
  - id: script_manual_run
    then:
      - lambda: |-
          int pump = id(menu_selection);
          if (pump == 1) id(script_p1).execute();
          else if (pump == 2) id(script_p2).execute();
          else if (pump == 3) id(script_p3).execute();
          else if (pump == 4) id(script_p4).execute();
          else if (pump == 5) id(script_p5).execute();
          else if (pump == 6) id(script_p6).execute();
          id(menu_last_activity) = millis();


