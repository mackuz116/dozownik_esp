          brightness: !lambda "return id(p1_speed).state / 100.0f;"
          transition_length: 0ms
      - delay: !lambda |-
          float ml_per_10s = id(c1).state;
          if (ml_per_10s < 0.1f) return 0;
          return (id(d1).state * (10.0f / ml_per_10s)) * 1000.0f;
      - light.turn_off: 
          id: p1
          transition_length: 0ms
      - lambda: |-
