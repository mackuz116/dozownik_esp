  - platform: dallas_temp
    name: "Temperatura Akwarium"
    id: temp_akwarium
    update_interval: 10s
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: template
    name: "TDS Akwarium"
    id: tds_real
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    lambda: |-
      float v = id(tds_voltage).state;
      float temp = id(temp_akwarium).state;

      if (v < 0.02 || isnan(temp)) return 0.0;

      float v_corr = v / (1.0 + 0.02 * (temp - 25.0));

      // FINALNA KALIBRACJA:
      // Przy v=0.075V pokaże: (0.075 - 0.079) * 463 + 38 = -1.8 + 38 = ~36 ppm
      float ppm = (v_corr - 0.079) * 463.0 + 38.0;

      if (ppm < 0) return 0.0;
      return ppm;
    update_interval: 5s

  - platform: rotary_encoder
    name: "Pokrętło Menu"
    id: menu_encoder
    pin_a:
      number: 32
      mode: INPUT_PULLUP
    pin_b:
      number: 33
      mode: INPUT_PULLUP
    min_value: 1
    max_value: 6
    resolution: 1
    filters:
      - debounce: 50ms # Kluczowe przy zakłóceniach od silników pomp
    on_value:
      then:
        - lambda: |-
            id(menu_active) = true;
            id(menu_last_activity) = millis();
            id(menu_selection) = (int)x;
        - component.update: my_display

