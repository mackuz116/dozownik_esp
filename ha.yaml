views:
  - title: Home
    sections:
      - type: grid
        cards:
          - type: heading
            heading: PRALKA
            heading_style: title
          - type: entity
            entity: update.haier_hon_update
          - type: entity
            entity: sensor.wash_dryer_program_phase
          - type: entities
            entities:
              - entity: sensor.wash_dryer_total_electricity_used
              - entity: sensor.wash_dryer_total_water_used
              - entity: sensor.wash_dryer_total_wash_cycle
              - entity: sensor.wash_dryer_end_time
            state_color: true
      - type: grid
        cards:
          - type: heading
            heading: Subbufery
            heading_style: title
          - type: entities
            entities:
              - entity: switch.smart_plug_11_switch_1
              - entity: sensor.smart_plug_11_total_energy
              - entity: switch.smart_plug_8_switch_1
              - entity: sensor.smart_plug_8_total_energy
            show_header_toggle: true
    header:
      layout: responsive
      badges_position: bottom
      badges_wrap: wrap
      card:
        type: markdown
        text_only: true
        content: |-
          # Witaj {{ user }} 
           Dodaj tutaj swój tekst, zmienne szablonu są obsługiwane ✨
  - type: sections
    max_columns: 4
    title: Akwarium
    path: Akwarium
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Nowa sekcja
          - type: entities
            entities:
              - entity: sensor.co2_i_lampa_moc
              - entity: sensor.co2_i_lampa_total_energy
              - entity: switch.co2_i_lampa_socket_2
                secondary_info: state
            title: Lampa
          - type: entities
            entities:
              - entity: switch.smart_plug_6_switch_1
                name: Falownik 1
                secondary_info: state
              - entity: switch.smart_plug_7_switch_1
                name: Falownik
                secondary_info: state
            title: Falowniki
          - type: entities
            entities:
              - entity: switch.filtr_i_grzalka_socket_1
                name: Filtr
                secondary_info: state
              - entity: sensor.filtr_i_grzalka_total_energy
              - entity: sensor.filtr_i_grzalka_moc
              - entity: switch.filtr_i_grzalka_socket_2
                name: 'Grzałka '
                secondary_info: state
              - entity: sensor.filtr_i_grzalka_total_energy
            title: 'Filtr i grzałka '
        column_span: 4
      - type: grid
        cards:
          - type: heading
            heading: Nowa sekcja
    header:
      layout: responsive
      badges_position: bottom
      badges_wrap: wrap
      card:
        type: markdown
        text_only: true
        title: Akwarium
        content: '# Akwarium: sterowanie'
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.dozownik_nawozow_00_czas_zegar_rtc
        icon: mdi:clock-time-five-outline
        show_entity_picture: false
        name: RTC
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.dozownik_nawozow_temperatura_akwarium
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.dozownik_nawozow_tds_akwarium
        name: TDS
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.dozownik_nawozow_ph_akwarium
        name: PH
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_datetime.ostatnia_podmiana_wody
        name: Ostatnia podmiana
        show_entity_picture: false
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_datetime.ostatni_test_wody
        name: Badanie wody
    subview: false
    cards: []
    background:
      opacity: 33
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
      image: /api/image/serve/d4586e8ec852a2c33ce61fa8d0dbdefb/original
  - type: sections
    path: dozownik
    max_columns: 4
    title: Dozownik
    sections:
      - type: custom:grid-layout
        layout:
          grid-template-columns: repeat(auto-fit, minmax(320px, 1fr))
          grid-gap: 15px
          mediaquery:
            '(max-width: 500px)':
              grid-template-columns: 1fr
            '(max-width: 1000px)':
              grid-template-columns: 1fr 1fr
            '(min-width: 1001px)':
              grid-template-columns: 1fr 1fr 1fr
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  ### MIKRO ({{ states('number.dozownik_nawozow_04_dawka_p1_ml')
                  | float(0) | round(0) }} ml)
              - type: gauge
                entity: sensor.butelka_p1_mikro_czysta
                name: 'P1: Mikro'
                min: 0
                max: 1000
                needle: true
                display_mode: needle
                show_state: true
                digit_precision: 0
                severity:
                  green: 400
                  yellow: 150
                  red: 0
              - type: entities
                entities:
                  - type: custom:fold-entity-row
                    head:
                      type: section
                      label: Parametry P1
                    open: false
                    entities:
                      - entity: number.dozownik_nawozow_04_dawka_p1_ml
                        name: Dawka (ml)
                        icon: mdi:water
                      - entity: number.dozownik_nawozow_02_butelka_p1_ml
                        name: Pojemność
                        icon: mdi:bottle-wine
                      - entity: number.dozownik_nawozow_03_kalib_p1_s_ml
                        name: Kalibracja (10s)
                        icon: mdi:align-vertical-bottom
                      - entity: number.dozownik_nawozow_05_czas_p1_h
                        name: Godzina
                        icon: mdi:clock-edit-outline
                      - entity: number.dozownik_nawozow_05_czas_p1_min
                        name: Minuta
                        icon: mdi:clock-edit-outline
                      - entity: number.dozownik_nawozow_p1_predkosc
                        name: Prędkość
                        icon: mdi:speedometer
                      - entity: switch.dozownik_nawozow_p1_poniedzialek
                        name: Poniedziałek
                      - entity: switch.dozownik_nawozow_p1_wtorek
                        name: Wtorek
                      - entity: switch.dozownik_nawozow_p1_sroda
                        name: Środe
                      - entity: switch.dozownik_nawozow_p1_czwartek
                        name: Czwartek
                      - entity: switch.dozownik_nawozow_p1_piatek
                        name: Piątek
                      - entity: switch.dozownik_nawozow_p1_sobota
                        name: Sobota
                      - entity: switch.dozownik_nawozow_p1_niedziela
