              %} ✅ Dozowanie Aktywne {% else %} ⚠️ System Wstrzymany {% endif %}


              ---

              #### 🧪 Receptura (na 1000ml RO):

              * **P2 (KNO3):** 80g soli + 0.4g E202 + 0.2g E300

              * **P3 (K2SO4):** 100g soli + 0.4g E202 + 0.2g E300

              * **Konserwanty:** Chronią przed pleśnią i bakteriami.
            grid_options:
              columns: full
          - type: markdown
            content: >-
              ### 📊 System Nawożenia 300L (Czyste Sole)


              | Nawóz | Zalecana (dzienna) | Podawana (dzienna) | Tygodniowo
              (Suma) | Cel (ppm) |

              | :--- | :---: | :---: | :---: | :---: |

              | **P2: Azot (KNO3)** | 2.1 ml | {{
              states('number.dozownik_nawozow_04_dawka_p2_ml') | float(0) }} ml
              | {{ (states('number.dozownik_nawozow_04_dawka_p2_ml') | float(0)
              * 0.163 * 7) | round(1) }} ppm | 10-20 |

              | **P3: Potas (K2SO4)** | 2.0 ml | {{
              states('number.dozownik_nawozow_04_dawka_p3_ml') | float(0) }} ml
              | {{ (states('number.dozownik_nawozow_04_dawka_p3_ml') | float(0)
              * 0.149 * 7) | round(1) }} ppm | 15-25* |

              | **P4: Magnez (MgSO4)** | 13.0 ml | {{
              states('number.dozownik_nawozow_04_dawka_p4_ml') | float(0) }} ml
              | {{ (states('number.dozownik_nawozow_04_dawka_p4_ml') | float(0)
              * 0.033 * 7) | round(1) }} ppm | 3-10 |

              | **P5: Fosfor (PO4)** | 1.0 ml | {{
              states('number.dozownik_nawozow_04_dawka_p5_ml') | float(0) }} ml
              | -- | 1.0 - 1.5 |

              | **Carbo** | 6.0 ml | {{
              states('number.dozownik_nawozow_04_dawka_carbo_ml') | float(0) }}
              ml | -- | Węgiel |

              | **Mikro** | 1.0 ml | {{
              states('number.dozownik_nawozow_04_dawka_mikro_ml') | float(0) }}
              ml | -- | Mikroelementy |

              | **Suma Potasu (K)** | -- | -- | {{
              ((states('number.dozownik_nawozow_04_dawka_p2_ml') | float(0) *
              0.103 + states('number.dozownik_nawozow_04_dawka_p3_ml') |
              float(0) * 0.149) * 7) | round(1) }} ppm | 15-25 |


              > [!INFO]

              > *Rezygnacja z Macro Blue Line na rzecz czystych soli. Zwiększono
              zalecaną dawkę P3 do 2.0 ml, aby zrekompensować brak potasu z
              Macro i utrzymać Sumę K w celu.*
            grid_options:
              columns: full
        column_span: 4
